<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoBox UI Prototype</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --soft: #f9f9f9;
      --soft-2: #f3f3f3;
      --line: #eaeaec;
      --line-2: #f0f0f0;
      --text: #111111;
      --muted: #666666;
      --muted-2: #888888;
      --black: #000000;
      --shadow: 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 12px 32px rgba(0,0,0,.08);
      --radius: 8px;
      --radius-sm: 6px;
      --focus: 0 0 0 2px rgba(0,0,0,.15);
      --yellow: #f5a623;
      --green: #17c964;
      --red: #ee0000;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      font-size: 14px;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    ::selection { background: var(--black); color: white; }

    .app { min-height: 100vh; display: flex; }
    .sidebar {
      width: 240px;
      flex: 0 0 240px;
      border-right: 1px solid var(--line);
      background: var(--soft);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .brand { display: flex; align-items: center; gap: 10px; padding: 0 8px; height: 36px; }
    .brand-mark {
      width: 24px; height: 24px; border-radius: var(--radius-sm);
      background: var(--black); color: #fff;
      display: grid; place-items: center; font-weight: 600; font-size: 13px;
    }
    .brand-title { font-size: 14px; font-weight: 600; }
    .brand-subtitle { display: none; }
    .nav { display: grid; gap: 2px; }
    .nav-btn {
      height: 32px; width: 100%; border: 0; border-radius: var(--radius-sm);
      display: flex; align-items: center; gap: 8px;
      background: transparent; color: var(--muted);
      padding: 0 10px; font-size: 13px;
      transition: background .1s, color .1s;
    }
    .nav-btn:hover { background: var(--line); color: var(--text); }
    .nav-btn.active { background: var(--line); color: var(--text); font-weight: 500; }
    .nav-ico { width: 16px; text-align: center; font-family: monospace; }
    .health, .sidebar-card {
      background: transparent; border-radius: 0; padding: 8px; box-shadow: none; border-top: 1px solid var(--line);
    }
    .health-head { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 500; color: var(--text); }
    .progress-meta { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); font-size:11px; }
    .progress { height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; margin-top: 6px; }
    .progress span { display:block; height:100%; width:72%; background:var(--black); border-radius:2px; }
    .sidebar-spacer { flex: 1; }
    .sidebar-card { padding: 8px; }
    .sidebar-card h4 { margin:0; font-size:12px; font-weight: 500; color: var(--text); }
    .sidebar-card p { margin:4px 0 0; font-size:12px; color:var(--muted); line-height:1.5; }

    .main { min-width: 0; flex: 1; display:flex; flex-direction:column; background: var(--bg); }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      display:flex; gap:16px; align-items:center;
      height: 64px;
    }
    .search-wrap { position: relative; flex: 1; max-width: 480px; }
    .search-wrap input {
      width: 100%; height: 32px; border: 1px solid var(--line); outline:0;
      border-radius: var(--radius-sm); background: var(--soft);
      padding: 0 12px 0 32px; font-size:13px; color:var(--text);
      transition: background .1s, border-color .1s;
    }
    .search-wrap input:focus { background: var(--bg); border-color: var(--muted-2); }
    .search-ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; font-family: monospace; }
    .btn {
      height: 32px; border: 1px solid var(--black); border-radius: var(--radius-sm);
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      padding: 0 12px; font-size:13px; font-weight: 500;
      background: var(--black); color:white;
      transition: background .1s, color .1s, border-color .1s;
      white-space: nowrap;
    }
    .btn:hover { background: #333; border-color: #333; }
    .btn.secondary { background: var(--bg); color: var(--text); border-color: var(--line); }
    .btn.secondary:hover { background: var(--soft); border-color: var(--muted-2); }
    .btn.ghost { background: transparent; color: var(--muted); border-color: transparent; }
    .btn.ghost:hover { background: var(--soft); color: var(--text); border-color: transparent; }
    .btn.danger { background: var(--bg); color: var(--red); border-color: var(--line); }
    .btn.danger:hover { background: #fff0f0; border-color: var(--red); }
    .btn.sm { height:28px; padding:0 8px; font-size:12px; border-radius:4px; }
    .btn.icon { width:32px; height:32px; padding:0; }

    .content { flex:1; overflow: auto; }
    .dashboard { padding: 32px; max-width: 1080px; margin: 0 auto; }
    .hero-grid { display:grid; grid-template-columns: 1fr; gap:24px; }
    .hero { background:var(--bg); border: 1px solid var(--line); border-radius:var(--radius); padding:32px; }
    .label {
      display:inline-flex; align-items:center; gap:6px;
      border-radius:4px; padding:4px 8px;
      background:var(--soft); color:var(--muted); font-size:12px; font-weight:500; border: 1px solid var(--line);
    }
    .hero h1 {
      margin:16px 0 0; max-width:760px;
      font-size: 32px; line-height:1.2;
      letter-spacing:-.02em; font-weight:600;
    }
    .hero p { margin:12px 0 0; max-width: 680px; color:var(--muted); font-size:14px; line-height:1.6; }
    .hero-actions { display:flex; gap:12px; margin-top: 24px; flex-wrap: wrap; }
    .metrics { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; margin-top:32px; }
    .metric { border: 1px solid var(--line); border-radius:var(--radius); background:var(--bg); padding:16px; }
    .metric-label { font-size:12px; color:var(--muted); font-weight:500; }
    .metric-value { margin-top:8px; font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size:24px; font-weight:600; letter-spacing:-.02em; }
    .metric-detail { margin-top:4px; font-size:12px; color:var(--muted-2); }
    
    .lower-grid { display:grid; grid-template-columns: 1fr 320px; gap:24px; margin-top:24px; }
    .panel { border: 1px solid var(--line); border-radius: var(--radius); background: var(--bg); }
    .panel-titlebar { display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--line); padding:16px; }
    .panel-titlebar h2 { margin:0; font-size:14px; font-weight: 600; }
    .panel-titlebar p { margin:4px 0 0; color:var(--muted); font-size:12px; }
    .row-list { display:flex; flex-direction: column; }
    .compact-row {
      display:flex; align-items:center; gap:12px; width:100%; border:0; background:transparent;
      padding:12px 16px; border-bottom:1px solid var(--line); text-align:left;
      transition: background .1s; cursor: pointer;
    }
    .compact-row:hover { background:var(--soft); }
    .compact-row:last-child { border-bottom:0; }
    .compact-info { min-width:0; flex:1; }
    .compact-title { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .compact-summary { margin-top:4px; font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .side-panels { display:grid; gap:24px; align-content: start; }
    .mini { padding: 0; }
    .mini-head { display:flex; justify-content:space-between; align-items:center; padding: 16px; border-bottom: 1px solid var(--line); }
    .mini-head h3 { margin:0; font-size:13px; font-weight: 500; }
    .mini-list { display:flex; flex-direction: column; }
    .mini-item { border:0; border-bottom: 1px solid var(--line); background:transparent; padding:12px 16px; text-align:left; transition:background .1s; cursor: pointer; }
    .mini-item:last-child { border-bottom: 0; }
    .mini-item:hover { background:var(--soft); }
    .mini-line { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .mini-title { min-width:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; font-weight:500; }
    .mini-cat { margin-top:4px; color:var(--muted); font-size:12px; }
    .empty { background:var(--soft); color:var(--muted); padding:24px; text-align:center; font-size:13px; }

    .library { display:flex; height: calc(100vh - 64px); overflow: hidden; }
    .library-main { flex: 1; min-width: 0; display: flex; flex-direction: column; border-right: 1px solid var(--line); background: var(--bg); }
    .library-head-wrap { padding: 24px; border-bottom: 1px solid var(--line); }
    .library-head { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; }
    .library-head h1 { margin:0; font-size:24px; font-weight: 600; letter-spacing:-.02em; }
    .library-head p { margin:6px 0 0; color:var(--muted); font-size:13px; }
    .match { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:12px; font-family: monospace; }
    .filters { display:flex; gap:6px; flex-wrap:wrap; margin-top:16px; }
    .pill {
      height:28px; border:1px solid var(--line); border-radius:4px; padding:0 10px;
      display:inline-flex; align-items:center; gap:6px; background:var(--bg); color:var(--muted);
      font-size:12px; font-weight:500; transition:all .1s ease;
    }
    .pill:hover { background:var(--soft); color: var(--text); border-color: var(--muted-2); }
    .pill.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .cards-scroll { flex: 1; overflow-y: auto; padding: 0; }
    .item-row {
      display: flex; align-items: flex-start; gap: 16px; padding: 16px 24px;
      border-bottom: 1px solid var(--line); background: transparent; border-left: 2px solid transparent;
      text-align: left; width: 100%; transition: background .1s; cursor: pointer; outline: none;
    }
    .item-row:hover { background: var(--soft); }
    .item-row.active { background: var(--soft); border-left-color: var(--text); }
    .row-main { flex: 1; min-width: 0; }
    .row-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .badge { display:inline-flex; align-items:center; border-radius:4px; padding:2px 6px; font-size:11px; font-weight:500; font-family: monospace; border: 1px solid var(--line); }
    .badge.prompt { background:var(--soft); color:var(--text); }
    .badge.skill { background:var(--bg); color:var(--muted); }
    .badge.pending { background:#fff8e6; border-color: #f5a623; color:#b07000; }
    .item-row h2 { margin:0; color:var(--text); font-size:14px; font-weight: 500; }
    .item-row p { margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
    .tag { display:inline-flex; font-size:12px; color:var(--muted); }
    .tag::before { content: "#"; color: var(--line); margin-right: 2px; }
    .row-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .updated { font-size:12px; color:var(--muted-2); font-family: monospace; }
    .action-group { display:flex; gap:4px; opacity: 0; transition: opacity .1s; }
    .item-row:hover .action-group, .item-row.active .action-group { opacity: 1; }
    .star-on { color:var(--yellow); }

    .no-results { padding: 48px; text-align:center; }
    .no-results strong { display:block; margin-top:12px; font-weight: 500; font-size: 14px; }
    .no-results p { margin:4px 0 0; color:var(--muted); font-size: 13px; }

    .detail { width: 480px; flex: 0 0 480px; background:var(--bg); display: flex; flex-direction: column; }
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; }
    .detail-head { padding:24px; border-bottom:1px solid var(--line); }
    .detail-head-line { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; }
    .detail-head h2 { margin:0; font-size:18px; font-weight: 600; line-height:1.3; }
    .detail-head p { margin:8px 0 0; color:var(--muted); line-height:1.6; font-size:13px; }
    .detail-body { flex: 1; overflow-y:auto; padding:24px; }
    .detail-section + .detail-section { margin-top:32px; }
    .section-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; padding-bottom: 8px; border-bottom: 1px solid var(--line); }
    .section-head h3 { margin:0; font-size:13px; font-weight: 600; color: var(--text); }
    .field { display:block; margin-top:16px; }
    .field-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .field-name { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace; font-size:12px; color: var(--text); }
    .required { color:var(--red); font-size:11px; }
    .field input {
      width:100%; height:32px; border:1px solid var(--line); outline:0; border-radius:var(--radius-sm); background:var(--bg);
      padding:0 10px; font-size:13px; font-family: monospace; color:var(--text);
      transition: border-color .1s;
    }
    .field input:focus { border-color:var(--text); }
    .field-desc { margin-top:6px; color:var(--muted); font-size:12px; }
    pre {
      margin:0; white-space:pre-wrap; word-break:break-word;
      background:var(--soft); color:var(--text);
      border: 1px solid var(--line); border-radius:var(--radius-sm); padding:16px;
      font-size:12px; line-height:1.6;
      max-height:400px; overflow:auto;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .usecase { border-radius:var(--radius-sm); border: 1px solid var(--line); background:var(--soft); padding:16px; }
    .usecase-title { font-size:12px; font-weight:600; font-family: monospace; }
    .usecase p { margin:6px 0 0; color:var(--muted); line-height:1.5; font-size:13px; }
    .detail-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; border-top:1px solid var(--line); padding:16px 24px; background: var(--bg); }

    .settings { padding:32px; max-width:800px; margin: 0 auto; }
    .settings h1 { margin:0; font-size:24px; font-weight: 600; }
    .settings > p { margin:8px 0 0; color:var(--muted); font-size:14px; }
    .settings-grid { display:grid; grid-template-columns:1fr; gap:16px; margin-top:32px; }
    .setting-card { border: 1px solid var(--line); border-radius:var(--radius); background:var(--bg); padding:20px; display: flex; gap: 16px; align-items: flex-start; }
    .setting-icon { width:32px; height:32px; border: 1px solid var(--line); border-radius:var(--radius-sm); background:var(--soft); display:grid; place-items:center; font-family: monospace; font-size: 14px; }
    .setting-card-content h2 { margin:0; font-size:14px; font-weight: 500; }
    .setting-card-content p { margin:6px 0 0; color:var(--muted); line-height:1.6; font-size:13px; }

    .drawer-backdrop {
      position: fixed; inset:0; z-index:40; display:none;
      background:rgba(0,0,0,.2); backdrop-filter: blur(2px);
    }
    .drawer-backdrop.open { display:block; }
    .drawer {
      position:absolute; right:0; top:0; height:100%; width:min(480px,100vw);
      background:var(--bg); border-left: 1px solid var(--line);
      transform:translateX(100%); transition:transform .2s cubic-bezier(.16,1,.3,1);
      display:flex; flex-direction:column;
    }
    .drawer-backdrop.open .drawer { transform:translateX(0); }
    .drawer-head { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; }
    .drawer-head h2 { margin:0; font-size:16px; font-weight: 600; }
    .drawer-head p { margin:4px 0 0; font-size:12px; color:var(--muted); }
    .drawer-body { padding:24px; overflow:auto; flex:1; }
    .seg { display:grid; grid-template-columns:1fr 1fr; background:var(--soft); padding:4px; border-radius:var(--radius-sm); border: 1px solid var(--line); }
    .seg button { height:28px; border:0; border-radius:4px; background:transparent; color:var(--muted); font-size:13px; font-weight:500; }
    .seg button.active { background:var(--bg); color:var(--text); box-shadow:var(--shadow); border: 1px solid var(--line); }
    .type-select { display:flex; gap:8px; margin-top:24px; }
    .form { margin-top:24px; display:grid; gap:20px; }
    .form label span { display:block; font-size:12px; font-weight:500; margin-bottom:8px; color: var(--text); }
    .form input, .form textarea {
      width:100%; border:1px solid var(--line); outline:0; background:var(--bg); border-radius:var(--radius-sm);
      padding:0 12px; font-size:13px; font-family: monospace;
      transition: border-color .1s;
    }
    .form input { height:36px; }
    .form textarea { min-height:240px; resize:none; padding:12px; line-height:1.6; }
    .form input:focus, .form textarea:focus { border-color:var(--text); }
    .rule { margin-top:24px; background:var(--soft); border:1px solid var(--line); border-radius:var(--radius-sm); padding:16px; }
    .rule-title { font-size:12px; font-weight:600; font-family: monospace; }
    .rule p { margin:6px 0 0; color:var(--muted); font-size:13px; line-height:1.5; }
    .error { margin-top:16px; border-radius:var(--radius-sm); border: 1px solid var(--red); background:#fff0f0; color:var(--red); padding:12px; font-size:13px; display:none; }
    .error.show { display:block; }
    .drawer-foot { padding:16px 24px; border-top:1px solid var(--line); background: var(--soft); }
    .drawer-foot .btn { width:100%; }

    .toast {
      position:fixed; right: 24px; bottom:24px; z-index:60;
      background:var(--text); color:var(--bg); border: 1px solid var(--line);
      border-radius:var(--radius-sm); padding:10px 16px; font-size:13px; font-weight:500;
      opacity:0; pointer-events:none; transition: opacity .15s, transform .15s;
      transform: translateY(10px);
      display:flex; align-items:center; gap:8px; font-family: monospace;
    }
    .toast.show { opacity:1; transform: translateY(0); }

    .mobile-top { display:none; }

    @media (max-width: 1180px) {
      .hero-grid, .lower-grid { grid-template-columns:1fr; }
      .library { grid-template-columns:1fr; }
      .detail { display:none; }
    }
    @media (max-width: 860px) {
      .sidebar { display:none; }
      .mobile-top {
        display:flex; gap:8px; overflow:auto; border-bottom:1px solid var(--line); background:#f6f6f7; padding:10px 12px;
      }
      .mobile-top .nav-btn { flex:0 0 auto; width:auto; background:white; box-shadow:var(--shadow); padding:0 12px; }
      .metrics, .cards, .settings-grid { grid-template-columns:1fr; }
      .library-main, .dashboard, .settings { padding:16px; }
      .topbar { padding:12px; }
      .library-head { align-items:flex-start; flex-direction:column; }
      .library-head h1, .settings h1 { font-size:28px; }
      .hero h1 { font-size:34px; }
    }
    @media (max-width: 520px) {
      .topbar { align-items:stretch; flex-direction:column; }
      .topbar .btn { width:100%; }
      .hero { padding:18px; }
      .hero-actions { flex-direction:column; }
      .hero-actions .btn { width:100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">R</div>
        <div>
          <div class="brand-title">RoBox</div>
          <div class="brand-subtitle">Prompt / Skill library</div>
        </div>
      </div>
      <nav class="nav" id="sidebarNav"></nav>
      <div class="health">
        <div class="health-head"><span>Library health</span><span style="color:var(--green)">✓</span></div>
        <div class="progress-meta"><span>Analyzed</span><span class="mono">72%</span></div>
        <div class="progress"><span></span></div>
      </div>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-card">
        <h4>Single-user protected</h4>
        <p>Supabase Auth + allowed email. Public deployment, private library.</p>
      </div>
    </aside>

    <main class="main">
      <div class="mobile-top" id="mobileNav"></div>
      <header class="topbar">
        <div class="search-wrap">
          <span class="search-ico">⌕</span>
          <input id="globalSearch" placeholder="Search title, content, tag…" />
        </div>
        <button class="btn" id="openComposer">＋ New</button>
      </header>
      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop">
    <aside class="drawer" role="dialog" aria-modal="true" aria-label="Add to RoBox">
      <div class="drawer-head">
        <div>
          <h2>Add to RoBox</h2>
          <p>先保存原文，再手动点击智能整理。</p>
        </div>
        <button class="btn ghost icon" id="closeComposer">×</button>
      </div>
      <div class="drawer-body">
        <div class="seg">
          <button class="active" data-mode="paste">Paste content</button>
          <button data-mode="github">GitHub skill</button>
        </div>
        <div id="drawerForm"></div>
        <div class="error" id="formError"></div>
      </div>
      <div class="drawer-foot">
        <button class="btn" id="saveItem">＋ Save raw content</button>
      </div>
    </aside>
  </div>

  <div class="toast" id="toast">✓ <span id="toastText">Copied</span></div>

  <script>
    const categories = ["All", "Writing", "Coding", "Research", "Design", "Study", "Agent", "Content", "Other"];
    const navItems = [
      { key: "dashboard", label: "Dashboard", icon: "⌂" },
      { key: "prompts", label: "Prompts", icon: "▣" },
      { key: "skills", label: "Skills", icon: "⌘" },
      { key: "settings", label: "Settings", icon: "⚙" }
    ];
    let items = [
      {
        id: "p-paper", type: "prompt", title: "论文结构化整理 Prompt",
        summary: "将论文 PDF 整理成中文结构化学习文档，并保留关键图表与思维导图。",
        category: "Research", tags: ["论文", "PDF", "中文整理", "思维导图"],
        content: "你是一名严谨的学术论文整理专家。请基于我上传的论文，生成一份中文结构化论文整理版 PDF。要求保留论文原本结构、顺序、论证逻辑，并提取关键图表。变量：{{paper}}，{{output_format}}。",
        sourceUrl: "", favorite: true, analyzed: true, usageCount: 17, updatedAt: "今天 19:38",
        variables: [
          { name: "paper", description: "需要整理的论文 PDF 或论文内容", defaultValue: "", required: true },
          { name: "output_format", description: "期望输出格式", defaultValue: "PDF", required: false }
        ]
      },
      {
        id: "s-design", type: "skill", title: "Waza /design",
        summary: "用于设计页面、组件和可交互原型，强调先锁定方向再输出界面。",
        category: "Design", tags: ["UI", "原型", "App Shell", "审美检查"],
        content: "https://github.com/tw93/Waza/tree/main/skills/design\n\nDesign: Build It With a Point of View. Lock the direction first, then write UI with a clear visual thesis.",
        sourceUrl: "https://github.com/tw93/Waza/tree/main/skills/design", favorite: true, analyzed: true, usageCount: 11, updatedAt: "今天 18:56", variables: []
      },
      {
        id: "p-codex", type: "prompt", title: "Codex 项目开发提示词",
        summary: "把产品定位、技术栈、数据库、页面结构和错误处理整理成开发提示词。",
        category: "Coding", tags: ["Codex", "Next.js", "MVP", "PRD"],
        content: "你是一名资深全栈工程师。请帮我从零实现一个名为 {{project_name}} 的个人网页应用。技术栈为 {{tech_stack}}，请优先保证 MVP 可运行。",
        sourceUrl: "", favorite: false, analyzed: true, usageCount: 8, updatedAt: "昨天 23:12",
        variables: [
          { name: "project_name", description: "项目名称", defaultValue: "RoBox", required: true },
          { name: "tech_stack", description: "技术栈", defaultValue: "Next.js + Supabase + DeepSeek + Vercel", required: true }
        ]
      },
      {
        id: "s-think", type: "skill", title: "Waza /think",
        summary: "在真正写代码前进行方案验证、风险攻击、边界收束和阶段拆解。",
        category: "Agent", tags: ["方案", "风险", "决策", "项目规划"],
        content: "https://github.com/tw93/Waza/tree/main/skills/think\n\nThink: Design and Validate Before You Build.",
        sourceUrl: "https://github.com/tw93/Waza/tree/main/skills/think", favorite: false, analyzed: true, usageCount: 6, updatedAt: "4月29日", variables: []
      },
      {
        id: "p-ui", type: "prompt", title: "高级 UI 重塑 Prompt",
        summary: "要求保留现有产品逻辑，只重塑视觉层，强调真实毛玻璃与高端产品感。",
        category: "Design", tags: ["UI重塑", "视觉", "移动端", "毛玻璃"],
        content: "你是一名专业、资深、有极致审美追求的 UI/UX 设计师。请根据 {{design_doc}} 完成 UI 界面和交互设计，不需要真正实现业务功能。",
        sourceUrl: "", favorite: true, analyzed: false, usageCount: 3, updatedAt: "4月28日",
        variables: [{ name: "design_doc", description: "设计文档或产品背景", defaultValue: "", required: true }]
      },
      {
        id: "s-kami", type: "skill", title: "Kami PDF 处理 Skill",
        summary: "用于读取 PDF、提取关键内容并转成结构化学习资料。",
        category: "Research", tags: ["PDF", "论文", "提取", "整理"],
        content: "https://github.com/tw93/Kami", sourceUrl: "https://github.com/tw93/Kami",
        favorite: false, analyzed: false, usageCount: 2, updatedAt: "4月27日", variables: []
      }
    ];

    let state = {
      view: "dashboard",
      selectedId: "p-paper",
      query: "",
      category: "All",
      favoriteOnly: false,
      pendingOnly: false,
      drawerMode: "paste",
      draftType: "prompt",
      variableValues: {}
    };

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (str = "") => str.replace(/[&<>'"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "'":"&#39;", '"':"&quot;" }[c]));
    const typeBadge = (type) => `<span class="badge ${type}">${type === "prompt" ? "▣ Prompt" : "⌘ Skill"}</span>`;
    const pendingBadge = (item) => item.analyzed ? "" : `<span class="badge pending">Need analyze</span>`;
    const getSelected = () => items.find(i => i.id === state.selectedId) || items[0];
    const queryMatch = (item) => [item.title, item.summary, item.content, item.category, ...item.tags].join(" ").toLowerCase().includes(state.query.toLowerCase());

    function renderNav() {
      const html = navItems.map(n => `
        <button class="nav-btn ${state.view === n.key ? "active" : ""}" data-nav="${n.key}">
          <span class="nav-ico">${n.icon}</span><span>${n.label}</span>
        </button>`).join("");
      $("sidebarNav").innerHTML = html;
      $("mobileNav").innerHTML = html;
      document.querySelectorAll("[data-nav]").forEach(btn => btn.onclick = () => {
        state.view = btn.dataset.nav;
        render();
      });
    }

    function visibleItems() {
      return items.filter(item => {
        if (state.view === "prompts" && item.type !== "prompt") return false;
        if (state.view === "skills" && item.type !== "skill") return false;
        if (state.category !== "All" && item.category !== state.category) return false;
        if (state.favoriteOnly && !item.favorite) return false;
        if (state.pendingOnly && item.analyzed) return false;
        return queryMatch(item);
      }).sort((a,b) => Number(b.favorite) - Number(a.favorite) || b.usageCount - a.usageCount);
    }

    function renderDashboard() {
      const filtered = items.filter(queryMatch);
      const pending = filtered.filter(i => !i.analyzed);
      const recent = [...filtered].sort((a,b)=>b.usageCount-a.usageCount).slice(0,4);
      const favorites = filtered.filter(i => i.favorite).slice(0,3);
      $("content").innerHTML = `
        <section class="dashboard">
          <div class="hero-grid">
            <div class="hero">
              <span class="label">▤ 保存 → 整理 → 搜索 → 复制</span>
              <h1>Your private command shelf for prompts and skills.</h1>
              <p>RoBox 把 Prompt 与 Skill 放进同一个工作台。左边找内容，中间筛选，右边直接填变量、整理和复制。</p>
              <div class="hero-actions">
                <button class="btn" data-open-drawer>＋ Quick add</button>
                <button class="btn secondary" data-go="prompts">Browse prompts</button>
                <button class="btn secondary" data-go="skills">Browse skills</button>
              </div>
              <div class="metrics">
                ${metric("Total", filtered.length, "Prompt + Skill")}
                ${metric("Prompts", filtered.filter(i=>i.type==='prompt').length, "可变量化模板")}
                ${metric("Skills", filtered.filter(i=>i.type==='skill').length, "文档或 GitHub 链接")}
                ${metric("Pending", pending.length, "待智能整理")}
              </div>
            </div>
            <div class="dark-panel">
              <div class="dark-head">
                <div><div class="dark-kicker">DeepSeek analyze</div><div class="dark-title">Manual trigger only</div></div>
                <div style="font-size:22px;color:#f6cf54">✦</div>
              </div>
              <div class="steps">
                ${["Save raw content first", "Generate title, summary, tags", "Extract variables for prompts"].map((s,i)=>`<div class="step"><span class="step-num">${i+1}</span>${s}</div>`).join("")}
              </div>
              <div class="next-action"><small>Next action</small><div>整理 ${pending.length} 个未分析条目，先不覆盖原文。</div></div>
            </div>
          </div>
          <div class="lower-grid">
            <div class="panel">
              <div class="panel-titlebar"><div><h2>Recently copied</h2><p>按复制次数模拟最近使用权重</p></div><button class="btn ghost sm" data-go="prompts">View all</button></div>
              <div class="row-list">${recent.map(compactRow).join("")}</div>
            </div>
            <div class="side-panels">
              ${miniPanel("Favorites", favorites)}
              ${miniPanel("Need analyze", pending, "当前没有待整理内容")}
            </div>
          </div>
        </section>`;
      wireCommon();
    }

    function metric(label, value, detail) {
      return `<div class="metric"><div class="metric-label">${label}</div><div class="metric-value mono">${value}</div><div class="metric-detail">${detail}</div></div>`;
    }
    function compactRow(item) {
      return `<button class="compact-row" data-select="${item.id}">
        ${typeBadge(item.type)}
        <div class="compact-info"><div class="compact-title">${escapeHtml(item.title)}</div><div class="compact-summary">${escapeHtml(item.summary)}</div></div>
        <div class="mono" style="font-size:12px;color:var(--muted)">${item.usageCount}</div>
      </button>`;
    }
    function miniPanel(title, list, empty = "暂无内容") {
      return `<div class="panel mini"><div class="mini-head"><h3>${title}</h3><span style="color:var(--muted)">•••</span></div><div class="mini-list">
        ${list.length ? list.map(item => `<button class="mini-item" data-select="${item.id}"><div class="mini-line"><span class="mini-title">${escapeHtml(item.title)}</span>${typeBadge(item.type)}</div><div class="mini-cat">${item.category}</div></button>`).join("") : `<div class="empty">${empty}</div>`}
      </div></div>`;
    }

    function renderLibrary() {
      const list = visibleItems();
      const mode = state.view;
      const heading = mode === "prompts" ? "Prompt library" : "Skill library";
      const sub = mode === "prompts" ? "变量填写、最终 Prompt 预览、一键复制。" : "保存 SKILL.md、子 skill 或 GitHub 链接。";
      $("content").innerHTML = `
        <section class="library">
          <div class="library-main">
            <div class="library-head">
              <div><h1>${heading}</h1><p>${sub}</p></div>
              <div class="match">☰ ${list.length} matched</div>
            </div>
            <div class="filters">
              ${categories.map(c => `<button class="pill ${state.category === c ? "active" : ""}" data-category="${c}">${c}</button>`).join("")}
              <button class="pill ${state.favoriteOnly ? "active" : ""}" data-toggle="favoriteOnly">★ Favorite</button>
              <button class="pill ${state.pendingOnly ? "active" : ""}" data-toggle="pendingOnly">✦ Need analyze</button>
            </div>
            <div class="cards">
              ${list.map(itemCard).join("")}
            </div>
            ${list.length ? "" : `<div class="no-results"><div style="font-size:28px">⌕</div><strong>没有匹配内容</strong><p>换一个关键词、分类或取消收藏筛选。</p></div>`}
          </div>
          <div class="detail">${renderDetail(getSelected())}</div>
        </section>`;
      wireCommon();
      document.querySelectorAll("[data-category]").forEach(btn => btn.onclick = () => { state.category = btn.dataset.category; render(); });
      document.querySelectorAll("[data-toggle]").forEach(btn => btn.onclick = () => { state[btn.dataset.toggle] = !state[btn.dataset.toggle]; render(); });
      document.querySelectorAll("[data-fav]").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); toggleFavorite(btn.dataset.fav); });
      document.querySelectorAll("[data-del]").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); deleteItem(btn.dataset.del); });
      document.querySelectorAll("[data-analyze]").forEach(btn => btn.onclick = (e) => { e.stopPropagation(); analyzeItem(btn.dataset.analyze); });
      wireDetail();
    }

    function itemCard(item) {
      return `<button class="item-card ${state.selectedId === item.id ? "active" : ""}" data-select="${item.id}">
        <div class="card-top"><div class="card-badges">${typeBadge(item.type)}${pendingBadge(item)}</div><span class="updated mono">${item.updatedAt}</span></div>
        <h2>${escapeHtml(item.title)}</h2>
        <p>${escapeHtml(item.summary)}</p>
        <div class="tags"><span class="tag"># ${item.category}</span>${item.tags.slice(0,3).map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
        <div class="card-actions"><span class="mono" style="font-size:11px;color:var(--muted)">Copied ${item.usageCount}</span>
          <span class="action-group">
            <span class="btn ghost icon" data-analyze="${item.id}" title="Analyze">✦</span>
            <span class="btn ghost icon ${item.favorite ? "star-on" : ""}" data-fav="${item.id}" title="Favorite">★</span>
            <span class="btn ghost icon" data-del="${item.id}" title="Delete">⌫</span>
          </span>
        </div>
      </button>`;
    }

    function renderDetail(item) {
      if (!item) return `<div class="detail-card"><div class="detail-head">选择一个条目</div></div>`;
      const tagHtml = `<div class="tags"><span class="tag">${item.category}</span>${item.tags.map(t=>`<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>`;
      return `<div class="detail-card">
        <div class="detail-head">
          <div class="detail-head-line">${typeBadge(item.type)}<button class="btn ghost icon">•••</button></div>
          <h2>${escapeHtml(item.title)}</h2>
          <p>${escapeHtml(item.summary)}</p>
          ${tagHtml}
        </div>
        <div class="detail-body">
          ${item.type === "prompt" ? renderPromptDetail(item) : renderSkillDetail(item)}
        </div>
        <div class="detail-actions">
          <button class="btn secondary" data-copy="raw">▤ Copy raw</button>
          <button class="btn" data-copy="ready">⧉ Copy ready</button>
        </div>
      </div>`;
    }

    function renderPromptDetail(item) {
      const vars = item.variables || [];
      const fields = vars.length ? vars.map(v => `<label class="field">
        <div class="field-row"><span class="field-name">${escapeHtml(v.name)}</span>${v.required ? `<span class="required">Required</span>` : ""}</div>
        <input data-var="${escapeHtml(v.name)}" value="${escapeHtml(state.variableValues[v.name] ?? v.defaultValue ?? "")}" placeholder="${escapeHtml(v.description)}" />
        <div class="field-desc">${escapeHtml(v.description)}</div>
      </label>`).join("") : `<div class="empty">没有识别到变量。仍可复制原始 Prompt。</div>`;
      return `<section class="detail-section">
        <div class="section-head"><h3>Variables</h3><span class="mono" style="font-size:12px;color:var(--muted)">${vars.length}</span></div>
        ${fields}
      </section>
      <section class="detail-section">
        <div class="section-head"><h3>Final prompt preview</h3><button class="btn secondary sm" data-copy="ready">⧉ Copy final</button></div>
        <pre id="finalPreview">${escapeHtml(getFinalText(item))}</pre>
      </section>`;
    }

    function renderSkillDetail(item) {
      return `<section class="detail-section">
        <div class="usecase"><div class="usecase-title">▤ Use case</div><p>保存可复制使用的 Skill 文档或 GitHub 链接。通过 GitHub 导入的 Skill 第一版只展示仓库链接与摘要，不抓取任意网页。</p></div>
      </section>
      <section class="detail-section">
        <div class="section-head"><h3>Skill source</h3><span style="color:var(--muted)">${item.sourceUrl ? "GitHub" : "Raw"}</span></div>
        <pre>${escapeHtml(item.sourceUrl || item.content)}</pre>
      </section>`;
    }

    function getFinalText(item) {
      if (item.type !== "prompt") return item.sourceUrl || item.content;
      return item.content.replace(/{{\s*([a-zA-Z0-9_]+)\s*}}/g, (_, key) => {
        const v = state.variableValues[key];
        const meta = (item.variables || []).find(x => x.name === key);
        return (v !== undefined && v !== "") ? v : (meta?.defaultValue || `{{${key}}}`);
      });
    }

    function wireDetail() {
      document.querySelectorAll("[data-var]").forEach(input => input.oninput = () => {
        state.variableValues[input.dataset.var] = input.value;
        const item = getSelected();
        const preview = $("finalPreview");
        if (preview) preview.textContent = getFinalText(item);
      });
      document.querySelectorAll("[data-copy]").forEach(btn => btn.onclick = () => {
        const item = getSelected();
        const text = btn.dataset.copy === "raw" ? item.content : getFinalText(item);
        copyText(text, btn.dataset.copy === "raw" ? "已复制原文" : (item.type === "prompt" ? "已复制最终 Prompt" : "已复制 Skill 链接"));
        item.usageCount += 1;
      });
    }

    function renderSettings() {
      $("content").innerHTML = `<section class="settings">
        <h1>Settings</h1>
        <p>MVP 先保留必要设置入口，避免把个人工具做复杂。</p>
        <div class="settings-grid">
          ${settingCard("✦", "DeepSeek API", "保存时不调用模型；只有点击智能整理时才请求 DeepSeek。API Key 建议放在服务端环境变量。")}
          ${settingCard("#", "Categories", "固定 Writing、Coding、Research、Design、Study、Agent、Content、Other 八类。标签由模型生成，可手动改。")}
          ${settingCard("⌘", "GitHub import", "只允许 github.com 和 raw.githubusercontent.com，第一版不抓取任意 URL。")}
          ${settingCard("▤", "Data export", "导出 JSON / Markdown 作为 Phase 4 体验优化项，当前先保留入口。")}
        </div>
      </section>`;
    }
    function settingCard(icon, title, desc) {
      return `<div class="setting-card"><div class="setting-icon">${icon}</div><h2>${title}</h2><p>${desc}</p></div>`;
    }

    function renderDrawerForm() {
      const form = $("drawerForm");
      if (state.drawerMode === "paste") {
        form.innerHTML = `<div class="type-select">
          <button class="pill ${state.draftType === "prompt" ? "active" : ""}" data-draft-type="prompt">▣ Prompt</button>
          <button class="pill ${state.draftType === "skill" ? "active" : ""}" data-draft-type="skill">⌘ Skill</button>
        </div>
        <div class="form">
          <label><span>Optional title</span><input id="draftTitle" placeholder="例如：小红书封面生成 Prompt" /></label>
          <label><span>Raw content</span><textarea id="draftContent" placeholder="粘贴 Prompt 原文、SKILL.md 或可复制使用的 Skill 文档…"></textarea></label>
        </div>`;
      } else {
        form.innerHTML = `<div class="form">
          <label><span>GitHub URL</span><input id="draftGithub" value="https://github.com/tw93/Waza" /></label>
        </div>
        <div class="rule"><div class="rule-title">⌘ Import rule</div><p>第一版只保存仓库链接，并根据 README / Skill 说明做摘要；不会抓取任意网页，也不会执行 Skill。</p></div>`;
      }
      document.querySelectorAll("[data-draft-type]").forEach(btn => btn.onclick = () => { state.draftType = btn.dataset.draftType; renderDrawerForm(); });
    }

    function openDrawer() {
      $("drawerBackdrop").classList.add("open");
      renderDrawerForm();
      $("formError").classList.remove("show");
      $("formError").textContent = "";
    }
    function closeDrawer() { $("drawerBackdrop").classList.remove("open"); }
    function saveDraft() {
      const error = $("formError");
      error.classList.remove("show");
      let type = state.draftType;
      let content = "";
      let title = "";
      let sourceUrl = "";
      if (state.drawerMode === "github") {
        type = "skill";
        content = $("draftGithub")?.value.trim() || "";
        sourceUrl = content;
        if (!/^https:\/\/(github\.com|raw\.githubusercontent\.com)\//.test(content)) {
          error.textContent = "第一版只允许 github.com 或 raw.githubusercontent.com 链接。";
          error.classList.add("show");
          return;
        }
      } else {
        title = $("draftTitle")?.value.trim() || "";
        content = $("draftContent")?.value.trim() || "";
      }
      if (!content) {
        error.textContent = "请先粘贴内容或输入 GitHub 链接。输入框不会被清空。";
        error.classList.add("show");
        return;
      }
      const id = `${type}-${Date.now()}`;
      const item = {
        id, type,
        title: title || `未命名 ${type === "prompt" ? "Prompt" : "Skill"}`,
        summary: "尚未智能整理。点击智能整理后生成摘要、分类、标签和变量。",
        category: "Other", tags: ["未整理"], content, sourceUrl,
        favorite: false, analyzed: false, usageCount: 0, updatedAt: "刚刚", variables: []
      };
      items.unshift(item);
      state.selectedId = id;
      state.view = type === "prompt" ? "prompts" : "skills";
      closeDrawer();
      render();
      showToast("已保存原文");
    }

    function wireCommon() {
      document.querySelectorAll("[data-select]").forEach(btn => btn.onclick = () => {
        const item = items.find(i => i.id === btn.dataset.select);
        if (!item) return;
        state.selectedId = item.id;
        state.view = item.type === "prompt" ? "prompts" : "skills";
        render();
      });
      document.querySelectorAll("[data-go]").forEach(btn => btn.onclick = () => { state.view = btn.dataset.go; render(); });
      document.querySelectorAll("[data-open-drawer]").forEach(btn => btn.onclick = openDrawer);
    }

    function toggleFavorite(id) {
      items = items.map(i => i.id === id ? { ...i, favorite: !i.favorite } : i);
      render();
    }
    function deleteItem(id) {
      items = items.filter(i => i.id !== id);
      if (state.selectedId === id) state.selectedId = items[0]?.id || "";
      render();
      showToast("已删除条目");
    }
    function analyzeItem(id) {
      items = items.map(i => i.id === id ? {
        ...i,
        analyzed: true,
        title: i.title.startsWith("未命名") ? (i.type === "prompt" ? "整理后 Prompt" : "整理后 Skill") : i.title,
        summary: i.summary || "DeepSeek 已生成摘要、分类和标签。原文仍完整保留。",
        tags: [...new Set([...i.tags.filter(t=>t!=="未整理"), i.type === "prompt" ? "变量" : "GitHub", "智能整理"] )].slice(0,6),
        updatedAt: "刚刚"
      } : i);
      render();
      showToast("已模拟智能整理");
    }
    async function copyText(text, message) {
      try { await navigator.clipboard.writeText(text); } catch(e) {}
      showToast(message || "Copied");
    }
    function showToast(message) {
      $("toastText").textContent = message;
      $("toast").classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => $("toast").classList.remove("show"), 1400);
    }

    function render() {
      renderNav();
      if (state.view === "dashboard") renderDashboard();
      else if (state.view === "settings") renderSettings();
      else renderLibrary();
    }

    $("globalSearch").addEventListener("input", (e) => { state.query = e.target.value; render(); $("globalSearch").focus(); $("globalSearch").value = state.query; });
    $("openComposer").onclick = openDrawer;
    $("closeComposer").onclick = closeDrawer;
    $("drawerBackdrop").addEventListener("click", (e) => { if (e.target.id === "drawerBackdrop") closeDrawer(); });
    document.querySelectorAll(".seg button").forEach(btn => btn.onclick = () => {
      state.drawerMode = btn.dataset.mode;
      document.querySelectorAll(".seg button").forEach(b => b.classList.toggle("active", b === btn));
      if (state.drawerMode === "github") state.draftType = "skill";
      renderDrawerForm();
    });
    $("saveItem").onclick = saveDraft;
    render();
  </script>
</body>
</html>
